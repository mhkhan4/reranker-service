services:
  reranker-service:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    ports:
      - "8001:8001"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    environment:
      - DEVICES=cuda:0
      - API_KEY=${API_KEY}
      - MAX_CONCURRENT_INFERENCES=4
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
